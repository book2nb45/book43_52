<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>BOOK2ht4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=BIZ+UDPGothic:wght@400;700&family=BIZ+UDPMincho&family=DotGothic16&family=Kaisei+Decol:wght@400;700&family=Dela+Gothic+One&family=Zen+Maru+Gothic:wght@400;700&family=Stick&family=Hachi+Maru+Pop&family=RocknRoll+One&family=Reggae+One&family=Oswald:wght@400;700&family=Bebas+Neue&family=Playfair+Display:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* --- 全体デザイン・カラー定義 --- */
    :root {
      --bg: #0d0f12;
      --panel-bg: #161a20;
      --card-bg: #1f242d;
      --accent: #ff4757;
      --accent-hover: #ff6b81;
      --text: #f1f2f6;
      --text-muted: #a4b0be;
      --line: #2f3542;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* --- メインレイアウト（プレビューと操作パネル） --- */
    .app-container {
      display: flex;
      flex: 1;
      height: calc(100vh - 140px); /* 下部タイムライン分の高さを除く */
    }

    .preview-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #000;
      position: relative;
    }

    #stage {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      background: #111;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #overlayLayer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
    }

    .overlay-text {
      position: absolute;
      transform: translate(-50%, -50%);
      cursor: move;
      user-select: none;
      white-space: pre-wrap;
      padding: 4px 8px;
      border: 1px dashed transparent;
    }
    
    .overlay-text:hover {
      border-color: var(--accent);
      background: rgba(0,0,0,0.3);
    }

    /* ドラッグ&ドロップエリア */
    #uploadZone {
      position: absolute;
      inset: 20px;
      border: 2px dashed var(--line);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--panel-bg);
      cursor: pointer;
      transition: all 0.3s;
      z-index: 10;
    }
    
    #uploadZone:hover {
      border-color: var(--accent);
      background: rgba(255, 71, 87, 0.05);
    }
    
    #uploadZone p {
      color: var(--text-muted);
      margin-top: 10px;
    }

    /* 再生コントロールバー */
    #transport {
      width: 100%;
      max-width: 800px;
      display: flex;
      align-items: center;
      gap: 15px;
      margin-top: 15px;
      padding: 10px 20px;
      background: var(--panel-bg);
      border-radius: 30px;
    }

    /* 右側サイドパネル */
    .control-panel {
      width: 380px;
      background: var(--panel-bg);
      border-left: 1px solid var(--line);
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
    }
    
    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    
    .tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
      background: rgba(255,71,87,0.02);
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* --- 下部タイムライン --- */
    #timelineArea {
      height: 140px;
      background: var(--panel-bg);
      border-top: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      padding: 10px 20px;
    }

    .timeline-toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    #ruler {
      position: relative;
      height: 60px;
      background: var(--bg);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
    }

    #ticks {
      display: flex;
      height: 100%;
      pointer-events: none;
    }
    
    .tick {
      border-left: 1px solid rgba(255,255,255,0.05);
      height: 100%;
      font-size: 10px;
      color: var(--text-muted);
      padding-left: 4px;
      padding-top: 2px;
    }

    .segment {
      position: absolute;
      top: 0;
      height: 100%;
      background: rgba(255, 71, 87, 0.2);
      border-right: 1px solid var(--accent);
      box-sizing: border-box;
    }
    
    .segment.cut {
      background: rgba(0, 0, 0, 0.6) !important;
      background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,0,0,0.1) 5px, rgba(255,0,0,0.1) 10px) !important;
      border-right: 1px solid #555;
    }

    .sub-track {
      position: absolute;
      bottom: 2px;
      height: 12px;
      background: rgba(0, 255, 180, 0.25);
      border: 1px solid #00ffb4;
      border-radius: 2px;
      font-size: 8px;
      color: #00ffb4;
      overflow: hidden;
      padding: 0 3px;
      line-height: 12px;
      white-space: nowrap;
      pointer-events: none;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin: 0 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
    }

    /* エリア効果（モザイク・ぼかし）の選択枠 */
    #areaSelectionBox {
      position: absolute;
      border: 2px dashed #00ffcc;
      background: rgba(0, 255, 204, 0.08);
      pointer-events: none;
      display: none;
      z-index: 20;
    }

    /* 登録済みエリア効果のラベル */
    .effect-area-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 15;
      box-sizing: border-box;
    }

    .effect-area-label {
      position: absolute;
      top: 2px;
      left: 4px;
      font-size: 9px;
      color: #00ffcc;
      font-family: monospace;
      background: rgba(0,0,0,0.5);
      padding: 1px 4px;
      border-radius: 2px;
      white-space: nowrap;
    }

    #playhead {
      position: absolute;
      top: 0;
      width: 2px;
      height: 100%;
      background: #00ffcc;
      pointer-events: none;
      z-index: 5;
    }

    /* --- 汎用UIコンポーネント --- */
    button {
      background: var(--card-bg);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    button:hover:not(:disabled) {
      background: var(--line);
    }
    
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
    }
    
    button.primary:hover:not(:disabled) {
      background: var(--accent-hover);
    }
    
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    input, select, textarea {
      background: var(--card-bg);
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .range-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    input[type="range"] {
      flex: 1;
      padding: 0;
    }

    .hidden {
      display: none !important;
    }
    
    .item-card {
      background: var(--card-bg);
      border: 1px solid var(--line);
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    .item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .item-actions button.del {
      padding: 2px 6px;
      background: none;
      border: none;
      color: var(--text-muted);
    }
    
    .item-actions button.del:hover {
      color: var(--accent);
    }
    
    .item-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <div class="preview-section">
      <div id="uploadZone">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
        </svg>
        <p>動画ファイルをドラッグ＆ドロップ、またはクリックして選択</p>
        <input type="file" id="fileInput" accept="video/*" class="hidden">
      </div>

      <div id="stage" class="hidden">
        <video id="video"></video>
        <div id="overlayLayer"></div>
        <div id="areaSelectionBox"></div>
        <canvas id="previewEffectCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:16;display:none;"></canvas>
      </div>

      <div id="transport" class="hidden">
        <button id="playBtn" style="min-width: 50px;">▶</button>
        <span id="curTime">00:00.0</span>
        <span style="color: var(--line);">/</span>
        <span id="durTime">00:00.0</span>
        
        <div style="margin-left: auto; display: flex; align-items: center; gap: 10px;">
          <label>速度</label>
          <select id="speedSelect" style="padding: 4px 8px;">
            <option value="0.5">0.5x</option>
            <option value="1.0" selected>1.0x</option>
            <option value="1.5">1.5x</option>
            <option value="2.0">2.0x</option>
          </select>
        </div>
      </div>
    </div>

    <div class="control-panel">
      <div class="tabs">
        <button class="tab active" data-tab="audio">音声</button>
        <button class="tab" data-tab="effect">映像効果</button>
        <button class="tab" data-tab="text">テロップ</button>
        <button class="tab" data-tab="subs">AI字幕</button>
        <button class="tab" data-tab="export">書き出し</button>
      </div>

      <div class="panel-content">
        <div id="panel-audio" class="panel">
          <div class="input-group">
            <label>元の動画音量 (<span id="origVolLabel">100%</span>)</label>
            <div class="range-container">
              <input type="range" id="origVol" min="0" max="300" value="100">
            </div>
          </div>
          <div class="input-group">
            <label>BGM追加</label>
            <input type="file" id="bgmInput" accept="audio/*">
            <div id="bgmInfo" style="font-size: 12px; color: var(--accent); margin-top: 4px;"></div>
          </div>
          <div class="input-group">
            <label>BGM音量 (<span id="bgmVolLabel">50%</span>)</label>
            <div class="range-container">
              <input type="range" id="bgmVol" min="0" max="300" value="50">
            </div>
          </div>
          <div style="display: flex; gap: 15px; font-size: 13px;">
            <label><input type="checkbox" id="noiseSuppress"> ノイズ軽減</label>
            <label><input type="checkbox" id="bgmLoop" checked> BGMループ</label>
          </div>
        </div>

        <div id="panel-effect" class="panel hidden">
          <div class="input-group">
            <label>プリセットフィルター</label>
            <select id="filterPreset">
              <option value="none">なし（デフォルト）</option>
              <option value="vivid">鮮やか（Vivid）</option>
              <option value="warm">暖かい（Warm）</option>
              <option value="cool">冷たい（Cool）</option>
              <option value="bw">モノクロ（B&W）</option>
              <option value="sepia">セピア（Sepia）</option>
            </select>
          </div>
          <div class="input-group">
            <label>明るさ (<span id="briLabel">100%</span>)</label>
            <input type="range" id="briRange" min="50" max="150" value="100">
          </div>
          <div class="input-group">
            <label>コントラスト (<span id="conLabel">100%</span>)</label>
            <input type="range" id="conRange" min="50" max="150" value="100">
          </div>
          <div class="input-group">
            <label>彩度 (<span id="satLabel">100%</span>)</label>
            <input type="range" id="satRange" min="0" max="200" value="100">
          </div>
          <div class="input-group">
            <label>色相環 (<span id="hueLabel">0°</span>)</label>
            <input type="range" id="hueRange" min="0" max="360" value="0">
          </div>
          <div class="input-group">
            <label>アスペクト比（画面サイズ）</label>
            <select id="aspectSelect">
              <option value="original">元動画を維持</option>
              <option value="16:9">16:9（横画面）</option>
              <option value="9:16">9:16（縦動画/Shorts）</option>
              <option value="1:1">1:1（正方形）</option>
            </select>
          </div>

          <div style="border-top:1px solid var(--line); margin:16px 0 12px; padding-top:12px;">
            <p class="section-title" style="margin-bottom:10px;">全体ぼかし</p>
            <div class="input-group">
              <label>ぼかし強度 (<span id="globalBlurLabel">0px</span>)</label>
              <input type="range" id="globalBlurRange" min="0" max="20" value="0" step="0.5">
            </div>
          </div>

          <div style="border-top:1px solid var(--line); margin:4px 0 12px; padding-top:12px;">
            <p class="section-title" style="margin-bottom:10px;">エリア モザイク / ぼかし</p>
            <p style="font-size:11px; color:var(--text-muted); line-height:1.6; margin-bottom:10px;">
              プレビュー上でドラッグして範囲を選択し、効果を追加します。
            </p>
            <div style="display:flex; gap:8px; margin-bottom:10px;">
              <div class="input-group" style="flex:1;">
                <label>効果の種類</label>
                <select id="areaEffectType">
                  <option value="mosaic">モザイク</option>
                  <option value="blur">ぼかし（ガウス）</option>
                </select>
              </div>
              <div class="input-group" style="flex:1;">
                <label>強度 (<span id="areaEffectStrLabel">10</span>)</label>
                <input type="range" id="areaEffectStr" min="2" max="40" value="10">
              </div>
            </div>
            <div style="display:flex; gap:8px; margin-bottom:10px;">
              <div class="input-group" style="flex:1;">
                <label>表示開始(秒)</label>
                <input type="number" id="areaEffectStart" value="0" step="0.1" min="0">
              </div>
              <div class="input-group" style="flex:1;">
                <label>表示終了(秒)</label>
                <input type="number" id="areaEffectEnd" value="9999" step="0.1" min="0">
              </div>
            </div>
            <div style="display:flex; gap:6px; margin-bottom:12px;">
              <button id="startAreaSelectBtn" style="flex:1; font-size:12px;">✚ エリアを選択</button>
              <button id="cancelAreaSelectBtn" style="flex:1; font-size:12px; display:none; color:#ff4757;">✕ キャンセル</button>
            </div>
            <div id="areaEffectList" style="max-height:180px; overflow-y:auto;"></div>
          </div>
        </div>

        <div id="panel-text" class="panel hidden">
          <div class="input-group">
            <label>テキスト入力</label>
            <textarea id="txtContent" rows="2" placeholder="ここに文字を入力..."></textarea>
          </div>
          <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
              <label>フォント</label>
              <select id="txtFont">
                <optgroup label="── 日本語 ゴシック系">
                  <option value="'Noto Sans JP', sans-serif">Noto Sans JP</option>
                  <option value="'BIZ UDPGothic', sans-serif">BIZ UDPゴシック</option>
                  <option value="'DotGothic16', sans-serif">DotGothic16（ドット調）</option>
                  <option value="'RocknRoll One', sans-serif">RocknRoll One</option>
                  <option value="'Reggae One', sans-serif">Reggae One</option>
                  <option value="'Dela Gothic One', sans-serif">Dela Gothic One（極太）</option>
                  <option value="'Zen Maru Gothic', sans-serif">Zen 丸ゴシック</option>
                  <option value="'Stick', sans-serif">Stick（細め）</option>
                  <option value="'Hachi Maru Pop', sans-serif">はちまるポップ</option>
                  <option value="'Meiryo', 'メイリオ', sans-serif">メイリオ（システム）</option>
                  <option value="'Yu Gothic', 'YuGothic', sans-serif">游ゴシック（システム）</option>
                  <option value="'MS PGothic', sans-serif">MS Pゴシック（システム）</option>
                </optgroup>
                <optgroup label="── 日本語 明朝系">
                  <option value="'Noto Serif JP', serif">Noto Serif JP</option>
                  <option value="'BIZ UDPMincho', serif">BIZ UDPMincho</option>
                  <option value="'Kaisei Decol', serif">Kaisei Decol</option>
                  <option value="'Yu Mincho', 'YuMincho', serif">游明朝（システム）</option>
                  <option value="'MS PMincho', serif">MS P明朝（システム）</option>
                </optgroup>
                <optgroup label="── 欧文 サンセリフ">
                  <option value="'Segoe UI', sans-serif" selected>Segoe UI（標準）</option>
                  <option value="'Roboto', sans-serif">Roboto</option>
                  <option value="'Oswald', sans-serif">Oswald</option>
                  <option value="'Bebas Neue', sans-serif">Bebas Neue（大文字）</option>
                  <option value="Arial, sans-serif">Arial</option>
                  <option value="'Arial Black', sans-serif">Arial Black</option>
                  <option value="Impact, sans-serif">Impact</option>
                  <option value="Verdana, sans-serif">Verdana</option>
                  <option value="Tahoma, sans-serif">Tahoma</option>
                </optgroup>
                <optgroup label="── 欧文 セリフ">
                  <option value="'Playfair Display', serif">Playfair Display</option>
                  <option value="Georgia, serif">Georgia</option>
                  <option value="'Times New Roman', serif">Times New Roman</option>
                </optgroup>
                <optgroup label="── 等幅・装飾">
                  <option value="'Courier New', monospace">Courier New</option>
                  <option value="Consolas, monospace">Consolas</option>
                  <option value="'Comic Sans MS', cursive">Comic Sans MS</option>
                </optgroup>
              </select>
            </div>
            <div class="input-group" style="flex: 1;">
              <label>文字色</label>
              <input type="color" id="txtColor" value="#ffffff" style="height: 40px; padding: 2px; width: 100%;">
            </div>
          </div>
          <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
              <label>表示開始(秒)</label>
              <input type="number" id="txtStart" value="0" step="0.1">
            </div>
            <div class="input-group" style="flex: 1;">
              <label>表示終了(秒)</label>
              <input type="number" id="txtEnd" value="3" step="0.1">
            </div>
          </div>
          <div style="display: flex; gap: 10px;">
            <div class="input-group" style="flex: 1;">
              <label>サイズ(px)</label>
              <input type="number" id="txtSize" value="28">
            </div>
            <div class="input-group" style="flex:1;" class="hidden">
              <input type="hidden" id="txtX" value="50">
              <input type="hidden" id="txtY" value="80">
            </div>
          </div>
          <button id="addTextBtn" class="primary">テキストを追加</button>
          
          <hr style="border: none; border-top: 1px solid var(--line); margin: 10px 0;">
          <label>配置済みテキスト一覧</label>
          <div id="textList" style="max-height: 200px; overflow-y: auto;"></div>
        </div>

        <div id="panel-subs" class="panel hidden">
          <p class="section-title">Web Speech API 音声認識</p>
          <p style="font-size:12px; color:var(--text-muted); line-height:1.7; margin-bottom:12px;">
            動画を再生しながらブラウザが音声を自動認識し、タイムラインへ字幕を追加します。<br>
            <b>Chrome推奨</b> · スピーカーONで実行してください。
          </p>
          <button id="genSubsBtn" class="primary" style="width:100%; margin-bottom:8px;">▶ 字幕生成を開始</button>
          <button id="stopSubsBtn" style="width:100%; margin-bottom:8px;" class="hidden">⏹ 停止</button>
          <div id="subsStatus" style="font-size:12px; color:var(--accent); min-height:20px; margin-bottom:12px;"></div>
          <p class="section-title" style="margin-top:4px;">生成された字幕</p>
          <div id="subsList" style="max-height:220px; overflow-y:auto;"></div>
        </div>

        <div id="panel-export" class="panel hidden">
          <p class="section-title">MP4書き出し設定</p>
          <p style="font-size:12px; color:var(--text-muted); line-height:1.7; margin-bottom:12px;">
            カット・テロップ・フィルターを適用してMP4で書き出します。動画の長さに応じて時間がかかります。
          </p>
          <div class="input-group" style="margin-bottom:12px;">
            <label style="text-transform:none; font-size:13px;"><input type="checkbox" id="includeAudio" checked> 音声を含める</label>
          </div>

          <p class="section-title">クロマキー合成</p>
          <div class="input-group" style="margin-bottom:8px;">
            <label style="text-transform:none; font-size:13px;"><input type="checkbox" id="chromaEnable"> グリーン/ブルーバックを透過</label>
          </div>
          <div style="display:flex; gap:10px; margin-bottom:8px;">
            <div class="input-group" style="flex:1;">
              <label>キーカラー</label>
              <input type="color" id="chromaColor" value="#00ff00" style="height:38px; padding:2px; width:100%;">
            </div>
            <div class="input-group" style="flex:1;">
              <label>許容範囲 (<span id="chromaThreshLabel">60</span>)</label>
              <input type="range" id="chromaThresh" min="10" max="150" value="60">
            </div>
          </div>
          <div class="input-group" style="margin-bottom:16px;">
            <label>背景色（透過部分）</label>
            <input type="color" id="chromaBg" value="#000000" style="height:38px; padding:2px; width:100%;">
          </div>

          <button id="startExportBtn" class="primary" style="width:100%;" disabled>MP4で書き出し開始</button>
          <div id="exportProgress" class="hidden" style="margin-top:12px;">
            <div style="background:var(--card-bg); border-radius:4px; overflow:hidden; border:1px solid var(--line); margin-bottom:6px;">
              <div id="exportProgressFill" style="height:6px; background:var(--accent); width:0%; transition:width .2s;"></div>
            </div>
            <div id="exportProgressLabel" style="font-size:12px; color:var(--text-muted); font-family:monospace;"></div>
          </div>
          <a id="downloadLink" class="hidden primary" style="display:none; margin-top:10px; text-align:center; color:#fff; font-weight:700; text-decoration:none; font-size:13px; padding:10px; border-radius:6px; background:var(--accent);"></a>
        </div>
      </div>
    </div>
  </div>

  <div id="timelineArea" class="hidden">
    <div class="timeline-toolbar">
      <button id="splitBtn" title="現在の位置で動画を分割します">✂ 再生位置で分割</button>
      <button id="deleteSegBtn" title="選択したブロックをカット（削除）します">🗑 ブロックを削除</button>
      <button id="resetCutsBtn" title="すべてのカットを元に戻します">↺ 編集をリセット</button>
      
      <div style="margin-left: auto; display: flex; gap: 10px;">
        <button id="exportBtn" class="primary" disabled>動画を書き出し ▸</button>
      </div>
    </div>
    
    <div id="ruler">
      <div id="ticks"></div>
      <div id="playhead"></div>
    </div>
  </div>

  <script>
    // --- 主要DOM要素のキャッシュ ---
    const video = document.getElementById('video');
    const stage = document.getElementById('stage');
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const overlayLayer = document.getElementById('overlayLayer');
    const transport = document.getElementById('transport');
    const timelineArea = document.getElementById('timelineArea');
    const playBtn = document.getElementById('playBtn');
    const splitBtn = document.getElementById('splitBtn');
    const curTimeLabel = document.getElementById('curTime');
    const durTimeLabel = document.getElementById('durTime');
    const speedSelect = document.getElementById('speedSelect');
    const ruler = document.getElementById('ruler');
    const ticks = document.getElementById('ticks');
    const playhead = document.getElementById('playhead');
    const deleteSegBtn = document.getElementById('deleteSegBtn');
    const resetCutsBtn = document.getElementById('resetCutsBtn');

    // フィルター系DOM
    const briRange = document.getElementById('briRange');
    const conRange = document.getElementById('conRange');
    const satRange = document.getElementById('satRange');
    const hueRange = document.getElementById('hueRange');
    const filterPreset = document.getElementById('filterPreset');
    const aspectSelect = document.getElementById('aspectSelect');
    const globalBlurRange = document.getElementById('globalBlurRange');

    // アプリケーション状態管理
    let videoDuration = 0;
    let segments = [];
    let selectedSegmentIndex = null;
    let textItems = [];
    let subtitleItems = [];
    let nextId = 1;

    // --- タイムスタンプフォーマッター (mm:ss.s) ---
    function formatTime(seconds) {
      if (!isFinite(seconds)) seconds = 0;
      const minutes = Math.floor(seconds / 60);
      const remainingSeconds = (seconds % 60).toFixed(1).padStart(4, '0');
      return `${String(minutes).padStart(2, '0')}:${remainingSeconds}`;
    }

    // --- ファイルインポート制御 ---
    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('dragover', (e) => { 
      e.preventDefault(); 
      uploadZone.style.borderColor = 'var(--accent)'; 
    });
    uploadZone.addEventListener('dragenter', (e) => { 
      e.preventDefault(); 
      uploadZone.style.borderColor = 'var(--accent)'; 
    });
    uploadZone.addEventListener('dragleave', (e) => { 
      e.preventDefault(); 
      uploadZone.style.borderColor = 'var(--line)'; 
    });
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.style.borderColor = 'var(--line)';
      const file = e.dataTransfer.files[0];
      if (file) loadVideoFile(file);
    });
    
    fileInput.addEventListener('change', (e) => {
      if (e.target.files[0]) loadVideoFile(e.target.files[0]);
    });

    function loadVideoFile(file) {
      const url = URL.createObjectURL(file);
      video.src = url;
      uploadZone.classList.add('hidden');
      stage.classList.remove('hidden');
      transport.classList.remove('hidden');
      timelineArea.classList.remove('hidden');
      document.getElementById('exportBtn').disabled = false;
      document.getElementById('startExportBtn').disabled = false;
    }

    video.addEventListener('loadedmetadata', () => {
      videoDuration = video.duration;
      durTimeLabel.textContent = formatTime(videoDuration);
      segments = [{ start: 0, end: videoDuration, cut: false }];
      document.getElementById('txtEnd').value = Math.min(3, videoDuration).toFixed(1);
      drawTimelineRuler();
      renderSegments();
    });

    // --- ビデオプレイヤー制御 & トラックジャンプ ---
    playBtn.addEventListener('click', () => {
      if (video.paused) video.play(); else video.pause();
    });
    video.addEventListener('play', () => playBtn.textContent = '❙❙');
    video.addEventListener('pause', () => playBtn.textContent = '▶');
    
    speedSelect.addEventListener('change', () => { 
      video.playbackRate = parseFloat(speedSelect.value); 
    });

    video.addEventListener('timeupdate', () => {
      curTimeLabel.textContent = formatTime(video.currentTime);
      const progressPercent = videoDuration ? (video.currentTime / videoDuration * 100) : 0;
      playhead.style.left = progressPercent + '%';
      renderOverlays();
      
      if (areaEffects.length > 0) renderAreaOverlays();
      
      // カット（削除）されたセグメントを自動でスキップするロジック
      const currentTime = video.currentTime;
      const currentSegment = segments.find(seg => currentTime >= seg.start && currentTime < seg.end);
      
      if (currentSegment && currentSegment.cut && !video.paused) {
        const nextValidSegment = segments.find(seg => !seg.cut && seg.start > currentTime);
        if (nextValidSegment) {
          video.currentTime = nextValidSegment.start;
        } else {
          video.pause();
          const lastValidSegment = [...segments].reverse().find(seg => !seg.cut);
          video.currentTime = lastValidSegment ? lastValidSegment.end : videoDuration;
        }
      }
    });

    // --- タイムラインUIレンダリング ---
    function drawTimelineRuler() {
      ticks.innerHTML = '';
      const step = videoDuration > 60 ? 10 : (videoDuration > 20 ? 5 : 1);
      for (let time = 0; time <= videoDuration; time += step) {
        const tickElement = document.createElement('div');
        tickElement.className = 'tick';
        tickElement.style.flex = `${step} 0 0`;
        tickElement.innerHTML = `<span>${formatTime(time)}</span>`;
        ticks.appendChild(tickElement);
      }
    }

    function renderSegments() {
      document.querySelectorAll('.segment, .sub-track').forEach(element => element.remove());
      
      // メイントラックのカット状態描画
      segments.forEach((segment, index) => {
        const segmentDiv = document.createElement('div');
        segmentDiv.className = 'segment' + (segment.cut ? ' cut' : '');
        segmentDiv.style.left = (segment.start / videoDuration * 100) + '%';
        segmentDiv.style.width = ((segment.end - segment.start) / videoDuration * 100) + '%';
        
        if (index === selectedSegmentIndex && !segment.cut) {
          segmentDiv.style.outline = '2px solid var(--accent)';
        }
        
        segmentDiv.addEventListener('click', (e) => {
          e.stopPropagation();
          if (segment.cut) return;
          selectedSegmentIndex = (selectedSegmentIndex === index) ? null : index;
          renderSegments();
        });
        ruler.appendChild(segmentDiv);
      });

      // AI字幕のサブトラック描画
      subtitleItems.forEach(subtitle => {
        if (!videoDuration) return;
        const subtitleDiv = document.createElement('div');
        subtitleDiv.className = 'sub-track';
        subtitleDiv.style.left = (subtitle.start / videoDuration * 100) + '%';
        subtitleDiv.style.width = Math.max(0.5, ((subtitle.end - subtitle.start) / videoDuration * 100)) + '%';
        subtitleDiv.textContent = subtitle.text;
        subtitleDiv.title = subtitle.text;
        ruler.appendChild(subtitleDiv);
      });
    }

    ruler.addEventListener('click', (e) => {
      const rect = ruler.getBoundingClientRect();
      const clickPercent = (e.clientX - rect.left) / rect.width;
      video.currentTime = Math.max(0, Math.min(videoDuration, clickPercent * videoDuration));
    });

    // クリップ分割処理
    splitBtn.addEventListener('click', () => {
      const currentTime = video.currentTime;
      const targetIndex = segments.findIndex(seg => currentTime > seg.start + 0.05 && currentTime < seg.end - 0.05);
      if (targetIndex === -1) return;
      
      const targetSegment = segments[targetIndex];
      segments.splice(targetIndex, 1,
        { start: targetSegment.start, end: currentTime, cut: targetSegment.cut },
        { start: currentTime, end: targetSegment.end, cut: targetSegment.cut }
      );
      renderSegments();
    });

    deleteSegBtn.addEventListener('click', () => {
      if (selectedSegmentIndex === null) return;
      segments[selectedSegmentIndex].cut = true;
      selectedSegmentIndex = null;
      renderSegments();
    });

    resetCutsBtn.addEventListener('click', () => {
      segments = [{ start: 0, end: videoDuration, cut: false }];
      selectedSegmentIndex = null;
      renderSegments();
    });

    // --- タブUI切り替え ---
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.remove('hidden');
      });
    });

    // --- オーディオ制御ルーチン ---
    const origVol = document.getElementById('origVol');
    const origVolLabel = document.getElementById('origVolLabel');
    const bgmVol = document.getElementById('bgmVol');
    const bgmVolLabel = document.getElementById('bgmVolLabel');

    // プレビュー用 Web Audio API（100%以上の音割れ・ブースト対応）
    let previewAudioCtx = null;
    let previewGainNode = null;
    let previewSrcNode  = null;

    function ensurePreviewAudio() {
      if (previewAudioCtx) return;
      previewAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      previewGainNode = previewAudioCtx.createGain();
      previewGainNode.connect(previewAudioCtx.destination);
      try {
        previewSrcNode = previewAudioCtx.createMediaElementSource(video);
        previewSrcNode.connect(previewGainNode);
      } catch(err) {
        console.warn('オーディオソースの取得に失敗しました', err);
      }
    }

    origVol.addEventListener('input', () => {
      const volumePercent = parseInt(origVol.value);
      origVolLabel.textContent = volumePercent + '%';
      const gainValue = volumePercent / 100;
      
      if (gainValue <= 1) {
        // 100%以下の通常範囲：標準の video.volume を使用
        if (previewGainNode) previewGainNode.gain.value = 1;
        video.volume = gainValue;
      } else {
        // 100%超：Gainノードで増幅（意図的な音割れ許容）
        ensurePreviewAudio();
        video.volume = 1;
        if (previewGainNode) previewGainNode.gain.value = gainValue;
      }
    });
    
    bgmVol.addEventListener('input', () => { 
      bgmVolLabel.textContent = bgmVol.value + '%'; 
    });

    // BGMファイル管理
    let bgmFile = null;
    let bgmBuffer = null;
    const bgmInput = document.getElementById('bgmInput');
    const bgmInfo = document.getElementById('bgmInfo');

    bgmInput.addEventListener('change', (e) => {
      bgmFile = e.target.files[0] || null;
      bgmBuffer = null;
      bgmInfo.textContent = bgmFile ? `選択中: ${bgmFile.name}` : '';
    });

    async function decodeBgm(audioContext) {
      if (!bgmFile) return null;
      if (bgmBuffer) return bgmBuffer;
      const arrayBuffer = await bgmFile.arrayBuffer();
      bgmBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
      return bgmBuffer;
    }

    // --- カラーフィルター & アスペクト比調整 ---
    const filterPresets = {
      none:  { bri: 100, con: 100, sat: 100, hue: 0 },
      bw:    { bri: 100, con: 110, sat: 0,   hue: 0 },
      sepia: { bri: 105, con: 100, sat: 60,  hue: 30 },
      vivid: { bri: 105, con: 120, sat: 150, hue: 0 },
      cool:  { bri: 100, con: 105, sat: 100, hue: 200 },
      warm:  { bri: 105, con: 100, sat: 110, hue: 20 },
    };

    filterPreset.addEventListener('change', () => {
      const config = filterPresets[filterPreset.value];
      briRange.value = config.bri; 
      conRange.value = config.con; 
      satRange.value = config.sat; 
      hueRange.value = config.hue;
      updateFilterLabels(); 
      applyPreviewFilter();
    });
    
    [briRange, conRange, satRange, hueRange].forEach(slider => {
      slider.addEventListener('input', () => { 
        updateFilterLabels(); 
        applyPreviewFilter(); 
      });
    });

    globalBlurRange.addEventListener('input', () => {
      document.getElementById('globalBlurLabel').textContent = globalBlurRange.value + 'px';
      applyPreviewFilter();
    });

    function updateFilterLabels() {
      document.getElementById('briLabel').textContent = briRange.value + '%';
      document.getElementById('conLabel').textContent = conRange.value + '%';
      document.getElementById('satLabel').textContent = satRange.value + '%';
      document.getElementById('hueLabel').textContent = hueRange.value + '°';
    }

    function applyPreviewFilter() {
      video.style.filter = buildFilterString();
    }

    function buildFilterString() {
      const blurValue = globalBlurRange.value;
      const blurCss = parseFloat(blurValue) > 0 ? ` blur(${blurValue}px)` : '';
      return `brightness(${briRange.value}%) contrast(${conRange.value}%) saturate(${satRange.value}%) hue-rotate(${hueRange.value}deg)${blurCss}`;
    }

    aspectSelect.addEventListener('change', () => {
      const aspectRatios = { 'original': null, '16:9': 16/9, '9:16': 9/16, '1:1': 1 };
      const selectedRatio = aspectRatios[aspectSelect.value];
      if (!selectedRatio) { 
        stage.style.aspectRatio = ''; 
        video.style.objectFit = ''; 
        return; 
      }
      stage.style.aspectRatio = selectedRatio;
      video.style.objectFit = 'cover';
    });

    // --- エリア効果（モザイク・ぼかし）処理 ---
    let areaEffects = []; // {id, type, intensity, normalizedX, normalizedY, normalizedW, normalizedH, start, end}
    let isAreaSelectMode = false;
    let areaDragStartCoords = null;

    const startAreaSelectBtn = document.getElementById('startAreaSelectBtn');
    const cancelAreaSelectBtn = document.getElementById('cancelAreaSelectBtn');
    const areaSelectionBox = document.getElementById('areaSelectionBox');
    const areaEffectStrSlider = document.getElementById('areaEffectStr');
    const previewEffectCanvas = document.getElementById('previewEffectCanvas');
    const previewEffectContext = previewEffectCanvas.getContext('2d');

    areaEffectStrSlider.addEventListener('input', () => {
      document.getElementById('areaEffectStrLabel').textContent = areaEffectStrSlider.value;
    });

    startAreaSelectBtn.addEventListener('click', () => {
      isAreaSelectMode = true;
      startAreaSelectBtn.style.display = 'none';
      cancelAreaSelectBtn.style.display = '';
      stage.style.cursor = 'crosshair';
      overlayLayer.style.pointerEvents = 'none';
    });

    cancelAreaSelectBtn.addEventListener('click', cancelAreaSelection);
    
    function cancelAreaSelection() {
      isAreaSelectMode = false;
      startAreaSelectBtn.style.display = '';
      cancelAreaSelectBtn.style.display = 'none';
      stage.style.cursor = '';
      overlayLayer.style.pointerEvents = 'auto';
      areaSelectionBox.style.display = 'none';
      areaDragStartCoords = null;
    }

    stage.addEventListener('mousedown', (e) => {
      if (!isAreaSelectMode) return;
      e.preventDefault();
      
      const stageRect = stage.getBoundingClientRect();
      areaDragStartCoords = {
        x: e.clientX - stageRect.left,
        y: e.clientY - stageRect.top,
        rectWidth: stageRect.width,
        rectHeight: stageRect.height
      };
      
      areaSelectionBox.style.display = 'block';
      areaSelectionBox.style.left = areaDragStartCoords.x + 'px';
      areaSelectionBox.style.top = areaDragStartCoords.y + 'px';
      areaSelectionBox.style.width = '0px';
      areaSelectionBox.style.height = '0px';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isAreaSelectMode || !areaDragStartCoords) return;
      
      const stageRect = stage.getBoundingClientRect();
      const currentMouseX = Math.max(0, Math.min(stageRect.width, e.clientX - stageRect.left));
      const currentMouseY = Math.max(0, Math.min(stageRect.height, e.clientY - stageRect.top));
      
      const boxX = Math.min(areaDragStartCoords.x, currentMouseX);
      const boxY = Math.min(areaDragStartCoords.y, currentMouseY);
      const boxWidth = Math.abs(currentMouseX - areaDragStartCoords.x);
      const boxHeight = Math.abs(currentMouseY - areaDragStartCoords.y);
      
      areaSelectionBox.style.left = boxX + 'px';
      areaSelectionBox.style.top = boxY + 'px';
      areaSelectionBox.style.width = boxWidth + 'px';
      areaSelectionBox.style.height = boxHeight + 'px';
    });

    document.addEventListener('mouseup', (e) => {
      if (!isAreaSelectMode || !areaDragStartCoords) return;
      
      const stageRect = stage.getBoundingClientRect();
      const currentMouseX = Math.max(0, Math.min(stageRect.width, e.clientX - stageRect.left));
      const currentMouseY = Math.max(0, Math.min(stageRect.height, e.clientY - stageRect.top));
      
      // 0〜1の割合（正規化座標）で領域を記録する
      const normalizedX = Math.min(areaDragStartCoords.x, currentMouseX) / areaDragStartCoords.rectWidth;
      const normalizedY = Math.min(areaDragStartCoords.y, currentMouseY) / areaDragStartCoords.rectHeight;
      const normalizedWidth = Math.abs(currentMouseX - areaDragStartCoords.x) / areaDragStartCoords.rectWidth;
      const normalizedHeight = Math.abs(currentMouseY - areaDragStartCoords.y) / areaDragStartCoords.rectHeight;

      if (normalizedWidth > 0.01 && normalizedHeight > 0.01) {
        const effectType = document.getElementById('areaEffectType').value;
        const effectIntensity = parseInt(areaEffectStrSlider.value);
        const startTime = parseFloat(document.getElementById('areaEffectStart').value) || 0;
        const endTime = parseFloat(document.getElementById('areaEffectEnd').value);
        
        areaEffects.push({
          id: nextId++,
          type: effectType, 
          intensity: effectIntensity,
          x: normalizedX, 
          y: normalizedY, 
          w: normalizedWidth, 
          h: normalizedHeight,
          start: startTime, 
          end: isFinite(endTime) ? endTime : 9999
        });
        
        renderAreaEffectList();
        renderAreaOverlays();
      }
      cancelAreaSelection();
    });

    function renderAreaEffectList() {
      const listContainer = document.getElementById('areaEffectList');
      listContainer.innerHTML = '';
      
      areaEffects.forEach(effectConfig => {
        const card = document.createElement('div');
        card.className = 'item-card';
        const typeLabel = effectConfig.type === 'mosaic' ? '🟦 モザイク' : '🌫 ぼかし';
        card.innerHTML = `
          <div class="item-top">
            <div style="font-size:12px;">${typeLabel}（強度 ${effectConfig.intensity}）</div>
            <div class="item-actions"><button data-id="${effectConfig.id}" class="del">✕</button></div>
          </div>
          <div class="item-meta">${formatTime(effectConfig.start)} → ${effectConfig.end >= 9999 ? '終端' : formatTime(effectConfig.end)}</div>
        `;
        
        card.querySelector('.del').addEventListener('click', () => {
          areaEffects = areaEffects.filter(effect => effect.id !== effectConfig.id);
          renderAreaEffectList();
          renderAreaOverlays();
        });
        listContainer.appendChild(card);
      });
    }

    // プレビュー画面上にエリア効果をリアルタイム反映する
    function renderAreaOverlays() {
      const currentTime = video.currentTime;
      const activeEffects = areaEffects.filter(effect => currentTime >= effect.start && currentTime <= effect.end);

      if (activeEffects.length === 0) {
        previewEffectCanvas.style.display = 'none';
        return;
      }
      previewEffectCanvas.style.display = 'block';

      const stageRect = stage.getBoundingClientRect();
      const stageWidth = stageRect.width;
      const stageHeight = stageRect.height;
      
      previewEffectCanvas.width = stageWidth;
      previewEffectCanvas.height = stageHeight;
      previewEffectContext.clearRect(0, 0, stageWidth, stageHeight);

      // object-fit:contain に伴う、実際のビデオ描画領域の計算
      const videoIntrinsicWidth = video.videoWidth || stageWidth;
      const videoIntrinsicHeight = video.videoHeight || stageHeight;
      const videoRatio = videoIntrinsicWidth / videoIntrinsicHeight;
      const stageRatio = stageWidth / stageHeight;
      
      let renderX, renderY, renderWidth, renderHeight;
      if (videoRatio > stageRatio) {
        renderWidth = stageWidth; 
        renderHeight = stageWidth / videoRatio;
        renderX = 0;   
        renderY = (stageHeight - renderHeight) / 2;
      } else {
        renderHeight = stageHeight; 
        renderWidth = stageHeight * videoRatio;
        renderY = 0;   
        renderX = (stageWidth - renderWidth) / 2;
      }

      // オフスクリーンキャンバスで1フレーム分の画像を処理する
      const offscreenCanvas = document.createElement('canvas');
      offscreenCanvas.width = renderWidth;
      offscreenCanvas.height = renderHeight;
      const offscreenContext = offscreenCanvas.getContext('2d');
      offscreenContext.drawImage(video, 0, 0, renderWidth, renderHeight);

      activeEffects.forEach(effectConfig => {
        const pixelX = Math.round(effectConfig.x * renderWidth);
        const pixelY = Math.round(effectConfig.y * renderHeight);
        const pixelW = Math.round(effectConfig.w * renderWidth);
        const pixelH = Math.round(effectConfig.h * renderHeight);
        if (pixelW < 1 || pixelH < 1) return;

        if (effectConfig.type === 'mosaic') {
          applyMosaicToContext(offscreenContext, pixelX, pixelY, pixelW, pixelH, effectConfig.intensity);
        } else {
          applyBlurToContext(offscreenContext, pixelX, pixelY, pixelW, pixelH, effectConfig.intensity);
        }
      });

      // 処理した画像をプレビューキャンバスに貼り付け
      previewEffectContext.drawImage(offscreenCanvas, renderX, renderY, renderWidth, renderHeight);

      // 編集用のガイド枠を描画
      activeEffects.forEach(effectConfig => {
        const guideX = renderX + effectConfig.x * renderWidth;
        const guideY = renderY + effectConfig.y * renderHeight;
        const guideW = effectConfig.w * renderWidth;
        const guideH = effectConfig.h * renderHeight;
        
        previewEffectContext.strokeStyle = 'rgba(0,255,204,0.6)';
        previewEffectContext.lineWidth = 1.5;
        previewEffectContext.setLineDash([4, 3]);
        previewEffectContext.strokeRect(guideX, guideY, guideW, guideH);
        previewEffectContext.setLineDash([]);
        
        previewEffectContext.fillStyle = 'rgba(0,255,204,0.7)';
        previewEffectContext.font = '9px monospace';
        previewEffectContext.fillText(effectConfig.type === 'mosaic' ? 'MOSAIC' : 'BLUR', guideX + 3, guideY + 11);
      });
    }

    // Canvasピクセル操作によるモザイク処理
    function applyMosaicToContext(context, startX, startY, width, height, blockSize) {
      const imageData = context.getImageData(startX, startY, width, height);
      const pixels = imageData.data;
      const validBlockSize = Math.max(2, blockSize);
      
      for (let blockY = 0; blockY < height; blockY += validBlockSize) {
        for (let blockX = 0; blockX < width; blockX += validBlockSize) {
          // ブロック左上のピクセルを代表色として取得
          const targetIndex = (blockY * width + blockX) * 4;
          const r = pixels[targetIndex];
          const g = pixels[targetIndex + 1];
          const b = pixels[targetIndex + 2];
          const a = pixels[targetIndex + 3];
          
          for (let dy = 0; dy < validBlockSize && blockY + dy < height; dy++) {
            for (let dx = 0; dx < validBlockSize && blockX + dx < width; dx++) {
              const fillIndex = ((blockY + dy) * width + (blockX + dx)) * 4;
              pixels[fillIndex] = r; 
              pixels[fillIndex + 1] = g; 
              pixels[fillIndex + 2] = b; 
              pixels[fillIndex + 3] = a;
            }
          }
        }
      }
      context.putImageData(imageData, startX, startY);
    }

    // 簡易ボックスブラー（フィルターを用いたオフスクリーン描画）
    function applyBlurToContext(context, startX, startY, width, height, blurRadius) {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = width;
      tempCanvas.height = height;
      const tempContext = tempCanvas.getContext('2d');
      
      tempContext.filter = `blur(${Math.max(1, blurRadius * 0.6)}px)`;
      tempContext.drawImage(context.canvas, startX, startY, width, height, 0, 0, width, height);
      context.drawImage(tempCanvas, 0, 0, width, height, startX, startY, width, height);
    }

    // --- テロップ（テキストオーバーレイ）処理 ---
    document.getElementById('addTextBtn').addEventListener('click', () => {
      const textContent = document.getElementById('txtContent').value.trim();
      if (!textContent) return;
      
      const newTextItem = {
        id: nextId++,
        text: textContent,
        font: document.getElementById('txtFont').value,
        start: parseFloat(document.getElementById('txtStart').value) || 0,
        end: parseFloat(document.getElementById('txtEnd').value) || 3,
        x: 50, y: 80,
        size: parseFloat(document.getElementById('txtSize').value) || 28,
        color: document.getElementById('txtColor').value
      };
      
      textItems.unshift(newTextItem);
      document.getElementById('txtContent').value = '';
      renderTextList(); 
      renderOverlays();
    });

    function renderTextList() {
      const listContainer = document.getElementById('textList');
      listContainer.innerHTML = '';
      
      textItems.forEach(textItem => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-top">
            <div class="item-text">${textItem.text}</div>
            <div class="item-actions"><button data-id="${textItem.id}" class="del">✕</button></div>
          </div>
          <div class="item-meta">${formatTime(textItem.start)} → ${formatTime(textItem.end)}</div>
        `;
        card.querySelector('.del').addEventListener('click', () => {
          textItems = textItems.filter(item => item.id !== textItem.id);
          renderTextList(); 
          renderOverlays();
        });
        listContainer.appendChild(card);
      });
    }

    function renderOverlays() {
      overlayLayer.innerHTML = '';
      const currentTime = video.currentTime;
      
      textItems.forEach(textItem => {
        if (currentTime >= textItem.start && currentTime <= textItem.end) {
          const overlayDiv = document.createElement('div');
          overlayDiv.className = 'overlay-text';
          overlayDiv.textContent = textItem.text;
          overlayDiv.dataset.id = textItem.id;
          overlayDiv.style.left = textItem.x + '%';
          overlayDiv.style.top = textItem.y + '%';
          overlayDiv.style.fontFamily = textItem.font;
          overlayDiv.style.fontSize = textItem.size + 'px';
          overlayDiv.style.color = textItem.color;
          overlayDiv.addEventListener('mousedown', startTextDrag);
          overlayLayer.appendChild(overlayDiv);
        }
      });
    }

    // ドラッグ＆ドロップによるテロップ位置調整
    let textDragState = null;
    
    function startTextDrag(e) {
      e.preventDefault();
      const targetDiv = e.currentTarget;
      const targetId = parseInt(targetDiv.dataset.id);
      const targetItem = textItems.find(item => item.id === targetId);
      if (!targetItem) return;
      
      textDragState = { item: targetItem, div: targetDiv };
      document.addEventListener('mousemove', onTextDrag);
      document.addEventListener('mouseup', stopTextDrag);
    }
    
    function onTextDrag(e) {
      if (!textDragState) return;
      const layerRect = overlayLayer.getBoundingClientRect();
      let percentX = (e.clientX - layerRect.left) / layerRect.width * 100;
      let percentY = (e.clientY - layerRect.top) / layerRect.height * 100;
      
      textDragState.item.x = Math.max(0, Math.min(100, percentX));
      textDragState.item.y = Math.max(0, Math.min(100, percentY));
      textDragState.div.style.left = textDragState.item.x + '%';
      textDragState.div.style.top = textDragState.item.y + '%';
    }
    
    function stopTextDrag() {
      textDragState = null;
      document.removeEventListener('mousemove', onTextDrag);
      document.removeEventListener('mouseup', stopTextDrag);
    }

    // 書き出しボタンから書き出しタブへの誘導
    document.getElementById('exportBtn').addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
      document.querySelector('.tab[data-tab="export"]').classList.add('active');
      document.getElementById('panel-export').classList.remove('hidden');
    });

    // --- AI自動字幕生成 (Web Speech API) ---
    const genSubsBtn = document.getElementById('genSubsBtn');
    const stopSubsBtn = document.getElementById('stopSubsBtn');
    const subsStatus = document.getElementById('subsStatus');
    let speechRecognitionInstance = null;

    genSubsBtn.addEventListener('click', () => {
      const SpeechRecognitionConfig = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognitionConfig) {
        subsStatus.textContent = 'このブラウザは音声認識に非対応です（Chromeをお使いください）。';
        return;
      }
      
      speechRecognitionInstance = new SpeechRecognitionConfig();
      speechRecognitionInstance.lang = 'ja-JP';
      speechRecognitionInstance.continuous = true;
      speechRecognitionInstance.interimResults = false;

      video.currentTime = 0;
      video.muted = false;
      video.volume = 1;

      speechRecognitionInstance.onresult = (e) => {
        const latestResult = e.results[e.results.length - 1];
        if (latestResult.isFinal) {
          const transcribedText = latestResult[0].transcript.trim();
          if (!transcribedText) return;
          
          const endTime = video.currentTime;
          const startTime = Math.max(0, endTime - 3);
          const generatedId = nextId++;
          
          subtitleItems.push({ id: generatedId, text: transcribedText, start: startTime, end: endTime });
          textItems.unshift({
            id: generatedId,
            text: transcribedText,
            start: startTime,
            end: endTime,
            x: 50, y: 85,
            size: 28,
            color: '#ffffff',
            font: "'Noto Sans JP', sans-serif"
          });
          
          renderTextList();
          renderSubtitleList();
          renderSegments();
        }
      };
      
      speechRecognitionInstance.onerror = (e) => { 
        subsStatus.textContent = '認識エラー: ' + e.error; 
      };
      
      speechRecognitionInstance.onend = () => {
        if (!video.paused && genSubsBtn.dataset.running === '1') {
          try { speechRecognitionInstance.start(); } catch(err) { console.warn(err); }
        }
      };

      genSubsBtn.dataset.running = '1';
      speechRecognitionInstance.start();
      video.play();
      subsStatus.textContent = '字幕生成中… 動画を再生しています。スピーカーから音が出るようにしてください。';
      genSubsBtn.classList.add('hidden');
      stopSubsBtn.classList.remove('hidden');
    });

    stopSubsBtn.addEventListener('click', () => {
      genSubsBtn.dataset.running = '0';
      if (speechRecognitionInstance) speechRecognitionInstance.stop();
      video.pause();
      subsStatus.textContent = '停止しました。';
      genSubsBtn.classList.remove('hidden');
      stopSubsBtn.classList.add('hidden');
    });

    function renderSubtitleList() {
      const subsListContainer = document.getElementById('subsList');
      subsListContainer.innerHTML = '';
      
      subtitleItems.forEach(subtitle => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="item-top">
            <div class="item-text" style="font-size:12px;">${escapeHtml(subtitle.text)}</div>
            <div class="item-actions"><button data-id="${subtitle.id}" class="del">✕</button></div>
          </div>
          <div class="item-meta">${formatTime(subtitle.start)} → ${formatTime(subtitle.end)}</div>
        `;
        card.querySelector('.del').addEventListener('click', () => {
          subtitleItems = subtitleItems.filter(item => item.id !== subtitle.id);
          textItems = textItems.filter(item => item.id !== subtitle.id);
          renderSubtitleList(); 
          renderTextList(); 
          renderSegments();
        });
        subsListContainer.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, match => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[match]));
    }

    // --- クロマキー処理 ---
    const chromaThreshSlider = document.getElementById('chromaThresh');
    chromaThreshSlider.addEventListener('input', () => {
      document.getElementById('chromaThreshLabel').textContent = chromaThreshSlider.value;
    });

    function hexToRgb(hexString) {
      const hexValue = parseInt(hexString.slice(1), 16);
      return [(hexValue >> 16) & 255, (hexValue >> 8) & 255, hexValue & 255];
    }

    function applyChromaKey(context, canvas) {
      const targetColor = document.getElementById('chromaColor').value;
      const replacementColor = document.getElementById('chromaBg').value;
      const tolerance = parseInt(chromaThreshSlider.value);
      
      const [targetR, targetG, targetB] = hexToRgb(targetColor);
      const [replaceR, replaceG, replaceB] = hexToRgb(replacementColor);
      
      const frameData = context.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = frameData.data;
      
      for (let i = 0; i < pixels.length; i += 4) {
        const diffR = pixels[i] - targetR;
        const diffG = pixels[i + 1] - targetG;
        const diffB = pixels[i + 2] - targetB;
        
        if (Math.sqrt(diffR * diffR + diffG * diffG + diffB * diffB) < tolerance) {
          pixels[i] = replaceR; 
          pixels[i + 1] = replaceG; 
          pixels[i + 2] = replaceB;
        }
      }
      context.putImageData(frameData, 0, 0);
    }

    // --- 書き出し用パイプライン（エリア効果、テキスト焼き付け） ---
    function applyAreaEffectsToCanvas(context, canvas, currentTime) {
      const activeEffects = areaEffects.filter(effect => currentTime >= effect.start && currentTime <= effect.end);
      
      activeEffects.forEach(effectConfig => {
        const pixelX = Math.round(effectConfig.x * canvas.width);
        const pixelY = Math.round(effectConfig.y * canvas.height);
        const pixelW = Math.round(effectConfig.w * canvas.width);
        const pixelH = Math.round(effectConfig.h * canvas.height);
        if (pixelW < 1 || pixelH < 1) return;
        
        if (effectConfig.type === 'mosaic') {
          applyMosaicToContext(context, pixelX, pixelY, pixelW, pixelH, effectConfig.intensity);
        } else {
          applyBlurToContext(context, pixelX, pixelY, pixelW, pixelH, effectConfig.intensity);
        }
      });
    }

    function drawTextOverlays(context, canvas, currentTime) {
      textItems.forEach(textItem => {
        if (currentTime < textItem.start || currentTime > textItem.end) return;
        context.save();
        context.font = `700 ${textItem.size}px ${textItem.font || 'sans-serif'}`;
        context.fillStyle = textItem.color;
        context.textAlign = 'center';
        context.textBaseline = 'middle';
        context.shadowColor = 'rgba(0,0,0,0.85)';
        context.shadowBlur = 6;
        
        const canvasX = canvas.width * (textItem.x / 100);
        const canvasY = canvas.height * (textItem.y / 100);
        const textLines = textItem.text.split('\n');
        
        textLines.forEach((line, lineIndex) => {
          const yOffset = lineIndex * textItem.size * 1.2 - (textLines.length - 1) * textItem.size * 0.6;
          context.fillText(line, canvasX, canvasY + yOffset);
        });
        context.restore();
      });
    }

    // --- MP4書き出し (FFmpeg & MediaRecorder) ---
    const exportCanvas = document.createElement('canvas');
    const exportContext = exportCanvas.getContext('2d');
    let ffmpegInstance = null;

    document.getElementById('startExportBtn').addEventListener('click', startExport);

    async function startExport() {
      const activeSegments = segments.filter(seg => !seg.cut).sort((a, b) => a.start - b.start);
      if (activeSegments.length === 0) { 
        alert('再生区間がありません。'); 
        return; 
      }

      const startBtn = document.getElementById('startExportBtn');
      const exportBtn = document.getElementById('exportBtn');
      const progressContainer = document.getElementById('exportProgress');
      const progressBarFill = document.getElementById('exportProgressFill');
      const progressLabel = document.getElementById('exportProgressLabel');
      const downloadLink = document.getElementById('downloadLink');

      startBtn.disabled = true;
      exportBtn.disabled = true;
      progressContainer.classList.remove('hidden');
      downloadLink.style.display = 'none';
      downloadLink.classList.add('hidden');
      progressBarFill.style.width = '0%';
      progressLabel.textContent = '準備中…';

      exportCanvas.width = video.videoWidth;
      exportCanvas.height = video.videoHeight;

      // クロッピング設定
      const aspectRatios = { 'original': null, '16:9': 16/9, '9:16': 9/16, '1:1': 1 };
      const targetRatio = aspectRatios[document.getElementById('aspectSelect').value];
      let sourceRect = { x: 0, y: 0, w: video.videoWidth, h: video.videoHeight };
      
      if (targetRatio) {
        const intrinsicWidth = video.videoWidth;
        const intrinsicHeight = video.videoHeight;
        if (intrinsicWidth / intrinsicHeight > targetRatio) {
          const croppedWidth = intrinsicHeight * targetRatio;
          sourceRect = { x: (intrinsicWidth - croppedWidth) / 2, y: 0, w: croppedWidth, h: intrinsicHeight };
        } else {
          const croppedHeight = intrinsicWidth / targetRatio;
          sourceRect = { x: 0, y: (intrinsicHeight - croppedHeight) / 2, w: intrinsicWidth, h: croppedHeight };
        }
        exportCanvas.width = Math.round(sourceRect.w);
        exportCanvas.height = Math.round(sourceRect.h);
      }

      // オーディオ設定 (Web Audio APIルーティング)
      const isAudioIncluded = document.getElementById('includeAudio').checked;
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      await audioContext.resume();
      const mediaStreamDestination = audioContext.createMediaStreamDestination();
      
      if (isAudioIncluded) {
        let videoAudioSource;
        try { videoAudioSource = audioContext.createMediaElementSource(video); } catch(e) { videoAudioSource = null; }
        
        if (videoAudioSource) {
          const originalAudioGain = audioContext.createGain();
          originalAudioGain.gain.value = parseInt(document.getElementById('origVol').value) / 100;
          const isNoiseSuppressed = document.getElementById('noiseSuppress').checked;
          let currentAudioNode = videoAudioSource;
          
          if (isNoiseSuppressed) {
            const highpassFilter = audioContext.createBiquadFilter();
            highpassFilter.type = 'highpass'; 
            highpassFilter.frequency.value = 150;
            
            const compressor = audioContext.createDynamicsCompressor();
            compressor.threshold.value = -45; 
            compressor.knee.value = 20;
            compressor.ratio.value = 8; 
            compressor.attack.value = 0.005; 
            compressor.release.value = 0.15;
            
            currentAudioNode.connect(highpassFilter); 
            highpassFilter.connect(compressor); 
            currentAudioNode = compressor;
          }
          currentAudioNode.connect(originalAudioGain); 
          originalAudioGain.connect(mediaStreamDestination);
        }
        
        if (bgmFile) {
          try {
            const decodedBgmBuffer = await decodeBgm(audioContext);
            if (decodedBgmBuffer) {
              const bgmSourceNode = audioContext.createBufferSource();
              bgmSourceNode.buffer = decodedBgmBuffer;
              bgmSourceNode.loop = document.getElementById('bgmLoop').checked;
              
              const bgmGainNode = audioContext.createGain();
              bgmGainNode.gain.value = parseInt(document.getElementById('bgmVol').value) / 100;
              
              bgmSourceNode.connect(bgmGainNode); 
              bgmGainNode.connect(mediaStreamDestination);
              bgmSourceNode.start();
              window.__exportBgmSource = bgmSourceNode;
            }
          } catch(err) { console.warn('BGMデコード失敗', err); }
        }
      }

      const canvasVideoStream = exportCanvas.captureStream(30);
      const combinedMediaStream = new MediaStream([
        ...canvasVideoStream.getVideoTracks(),
        ...(isAudioIncluded ? mediaStreamDestination.stream.getAudioTracks() : [])
      ]);

      let encodingMimeType = 'video/webm;codecs=vp9,opus';
      if (!MediaRecorder.isTypeSupported(encodingMimeType)) encodingMimeType = 'video/webm;codecs=vp8,opus';
      if (!MediaRecorder.isTypeSupported(encodingMimeType)) encodingMimeType = 'video/webm';

      const mediaRecorder = new MediaRecorder(combinedMediaStream, { mimeType: encodingMimeType, videoBitsPerSecond: 6_000_000 });
      const recordedChunks = [];
      mediaRecorder.ondataavailable = event => { if (event.data.size > 0) recordedChunks.push(event.data); };

      const totalRenderDuration = activeSegments.reduce((sum, seg) => sum + (seg.end - seg.start), 0);
      let previouslyElapsedDuration = 0;
      const isChromaEnabled = document.getElementById('chromaEnable').checked;

      mediaRecorder.start();
      video.muted = false;
      video.playbackRate = 1;

      // 非同期での順次レンダリング
      for (let i = 0; i < activeSegments.length; i++) {
        const segment = activeSegments[i];
        await new Promise(resolveSegment => {
          video.currentTime = segment.start;
          
          const onSeekedCallback = () => {
            video.removeEventListener('seeked', onSeekedCallback);
            video.play();
            let animationFrameId;
            
            function renderFrame() {
              exportContext.filter = buildFilterString();
              exportContext.drawImage(video, sourceRect.x, sourceRect.y, sourceRect.w, sourceRect.h, 0, 0, exportCanvas.width, exportCanvas.height);
              exportContext.filter = 'none';
              
              if (isChromaEnabled) applyChromaKey(exportContext, exportCanvas);
              applyAreaEffectsToCanvas(exportContext, exportCanvas, video.currentTime);
              drawTextOverlays(exportContext, exportCanvas, video.currentTime);
              
              const currentElapsedDuration = previouslyElapsedDuration + (video.currentTime - segment.start);
              progressBarFill.style.width = Math.min(100, currentElapsedDuration / totalRenderDuration * 100) + '%';
              progressLabel.textContent = `書き出し中… ${formatTime(currentElapsedDuration)} / ${formatTime(totalRenderDuration)}`;
              
              if (video.currentTime >= segment.end - 0.03 || video.ended) {
                video.pause();
                cancelAnimationFrame(animationFrameId);
                previouslyElapsedDuration += (segment.end - segment.start);
                resolveSegment();
                return;
              }
              animationFrameId = requestAnimationFrame(renderFrame);
            }
            animationFrameId = requestAnimationFrame(renderFrame);
          };
          video.addEventListener('seeked', onSeekedCallback);
        });
      }

      mediaRecorder.stop();
      await new Promise(resolveRecord => mediaRecorder.onstop = resolveRecord);
      
      if (window.__exportBgmSource) {
        try { window.__exportBgmSource.stop(); } catch(err) {}
        window.__exportBgmSource = null;
      }

      const generatedWebmBlob = new Blob(recordedChunks, { type: 'video/webm' });
      progressLabel.textContent = 'MP4に変換中…';

      try {
        const generatedMp4Blob = await convertWebmToMp4(generatedWebmBlob, progressRatio => {
          progressBarFill.style.width = (progressRatio * 100) + '%';
          progressLabel.textContent = `MP4変換中… ${Math.round(progressRatio * 100)}%`;
        });
        const finalDownloadUrl = URL.createObjectURL(generatedMp4Blob);
        downloadLink.href = finalDownloadUrl;
        downloadLink.download = 'edited-video.mp4';
        downloadLink.textContent = '⬇ edited-video.mp4 をダウンロード';
        progressLabel.textContent = '完了！';
        progressBarFill.style.width = '100%';
      } catch(conversionError) {
        console.error(conversionError);
        const fallbackDownloadUrl = URL.createObjectURL(generatedWebmBlob);
        downloadLink.href = fallbackDownloadUrl;
        downloadLink.download = 'edited-video.webm';
        downloadLink.textContent = '⬇ MP4変換に失敗 — WebMでダウンロード';
        progressLabel.textContent = 'WebMで出力しました。';
      }

      downloadLink.style.display = 'block';
      downloadLink.classList.remove('hidden');
      startBtn.disabled = false;
      exportBtn.disabled = false;
    }

    async function convertWebmToMp4(webmBlob, onProgressUpdate) {
      if (!ffmpegInstance) {
        await loadExternalScript('https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js');
        const { createFFmpeg } = FFmpeg;
        ffmpegInstance = createFFmpeg({ log: false });
        ffmpegInstance.setProgress(({ ratio }) => { if (ratio >= 0) onProgressUpdate(Math.min(1, ratio)); });
        await ffmpegInstance.load();
      }
      const fileBuffer = await webmBlob.arrayBuffer();
      ffmpegInstance.FS('writeFile', 'input.webm', new Uint8Array(fileBuffer));
      
      await ffmpegInstance.run('-i', 'input.webm', '-c:v', 'libx264', '-preset', 'ultrafast', '-crf', '28', '-threads', '0', '-c:a', 'aac', '-b:a', '128k', 'output.mp4');
      
      const outputData = ffmpegInstance.FS('readFile', 'output.mp4');
      ffmpegInstance.FS('unlink', 'input.webm');
      ffmpegInstance.FS('unlink', 'output.mp4');
      return new Blob([outputData.buffer], { type: 'video/mp4' });
    }

    function loadExternalScript(scriptUrl) {
      return new Promise((resolveScript, rejectScript) => {
        if (document.querySelector(`script[src="${scriptUrl}"]`)) return resolveScript();
        const scriptTag = document.createElement('script');
        scriptTag.src = scriptUrl; 
        scriptTag.onload = resolveScript; 
        scriptTag.onerror = rejectScript;
        document.head.appendChild(scriptTag);
      });
    }
  </script>
